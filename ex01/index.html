<!-- index.html 은 기본 파일명 # ! 하고 엔터 치면 아래의 기본 html 파일 형식이
만들어짐 -->
<!-- 주석 단축키: Ctrl + / (윈도우) , Command + / (맥) -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>홈페이지</title>
  </head>
  <body>
    <h1>환영합니다!</h1>
    <!-- 제목 태그, h1은 가장 큰 제목을 나타냄. 숫자가 커질수록 글자의 크기가 작아짐 -->

    <p>이것은 홈 페이지입니다.</p>
    <!-- 단락 태그, p는 문단을 나타냄 -->
  </body>
</html>

<!-- 오른쪽 아래의 go live 버튼을 누르면 실시간으로 웹페이지를 볼 수 있음  -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>[원유진]-등록</title>
  </head>
  <body>
    <header>
      <h1>사용자 등록 신청서</h1>
    </header>
    <main>
      <form actoin="링크가필요해요">
        <fieldset>
          <legend>기본 정보(Essensial)</legend>
          <!-- label의 for 속성이 input의 id 속성에 들어가야 함 -->
          <!-- name 속성은 서버에 보내는 용이라 함. 아직 서버 만들지 x -->
          <label for="fname">아이디(12자 이내)</label><br />
          <input
            type="text"
            id="fname"
            name="fname"
            autocorrect="on"
            maxlength="12"
          /><br />
          <label for="PW">비밀번호(20자 이내)</label><br />
          <input type="text" id="PW" name="PW" maxlength="20" /><br />
          <label for="email">이메일:</label><br />
          <input type="text" id="email" name="email" /> <br />
        </fieldset>
        <fieldset>
          <legend>부가 정보</legend>
          <label for="phone">연락처:</label> <br />
          <input
            type="text"
            id="phone"
            name="phone"
            placeholder="010-1234-5678"
          /><br />
          <p>관심 분야:</p>
          <input
            type="checkbox"
            id="interest1"
            name="interest1"
            value="HTML5"
          />
          <label for="interest1">HTML5</label>
          <input type="checkbox" id="interest2" name="interest2" value="CSS3" />
          <label for="interest2">CSS3</label>
          <input
            type="checkbox"
            id="interest3"
            name="interest3"
            value="JavaScript"
          />
          <label for="interest3">JavaScript</label><br />

          <label for="work">숙련도:</label><br />
          <input type="range" id="work" min="0" max="100" />
        </fieldset>
      </form>
      <button type="button" onclick="alert('제출 완료되었습니다!')">
        제출
      </button>

      <!-- 초기화 어캐 만드는지? -->
      <button type="button" onclick="alert('초기화 완료되었습니다!')">
        초기화
      </button>
    </main>
    <footer>
      <a href="index.html">홈으로</a><br />
      &copy;2026 Web Programming Course. All right reserved.
    </footer>
  </body>
</html>
